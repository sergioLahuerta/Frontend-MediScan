<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            // Tu nuevo color más oscuro
                            DEFAULT: 'oklch(69.6% 0.17 162.48)',
                            dark: 'oklch(60% 0.17 162.48)',
                            light: 'oklch(80% 0.1 162.48)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .chat-container {
            height: calc(100vh - 160px);
        }

        .message-user {
            background-color: oklch(69.6% 0.17 162.48);
            color: white;
            border-radius: 15px 15px 2px 15px;
        }

        .message-ai {
            background-color: #f3f4f6;
            color: #1f2937;
            border-radius: 15px 15px 15px 2px;
        }

        #chat-box {
            position: relative;
            /* Necesario para posicionar el fondo */
            height: calc(100vh - 160px);
            overflow-y: auto;
            padding: 1rem;
        }

        #chat-box::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            /* Tu imagen de fondo */
            background-image: url('./favicon.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 400px;
            /* Ajusta el tamaño que quieras */
            /* AQUÍ CONTROLAS LA OPACIDAD */
            opacity: 0.4;
            z-index: 0;
            /* Lo manda al fondo */
            pointer-events: none;
            /* Evita que interfiera con el scroll */
        }

        /* Asegura que los mensajes queden por encima del fondo */
        #chat-box>div {
            position: relative;
            z-index: 1;
        }

        /* Personalización de la barra de desplazamiento para que combine */
        #chat-box::-webkit-scrollbar {
            width: 6px;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background-color: oklch(69.6% 0.17 162.48 / 0.3);
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans">

    <div class="max-w-3xl mx-auto h-screen flex flex-col bg-white shadow-2xl">
        <header class="p-4 border-b bg-primary text-white flex justify-between items-center shadow-sm">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Health Assistant Pro</h1>
                <p class="text-xs opacity-90 font-medium">Soporte al Diagnóstico Temprano</p>
            </div>
            <span class="text-xs bg-white/20 px-2 py-1 rounded-full border border-white/30">Sesión #1</span>
        </header>

        <div id="chat-box" class="chat-container overflow-y-auto p-4 space-y-4">
            <div class="flex justify-start">
                <div class="message-ai p-3 max-w-[85%] shadow-sm border border-gray-100">
                    Hola. Estoy listo para asistirle en el análisis clínico. ¿Desea adjuntar una imagen o describir
                    algún síntoma?
                </div>
            </div>
        </div>

        <div class="p-4 border-t bg-white">
            <div class="flex items-end gap-2 bg-gray-50 p-2 rounded-xl border border-gray-200">
                <label class="cursor-pointer p-2 hover:bg-gray-200 rounded-lg transition-colors group">
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-6 w-6 text-primary group-hover:scale-110 transition-transform" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v4m-2-2h4" />
                    </svg>
                </label>

                <textarea id="user-input" placeholder="Escriba su consulta..."
                    class="flex-1 p-2 bg-transparent focus:outline-none resize-none min-h-[40px] max-h-[150px] text-gray-700"
                    rows="1"></textarea>

                <button onclick="sendMessage()"
                    class="bg-primary hover:bg-primary-dark text-white p-2 rounded-lg transition-all shadow-md active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
            <div id="file-preview"
                class="text-[10px] text-primary mt-2 hidden flex items-center gap-1 font-bold italic">
                <span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span> Imagen lista para procesar
            </div>
        </div>
    </div>

    <script>
        // El JavaScript permanece igual, ya que las IDs no han cambiado.
        // Solo asegúrate de mantener la lógica de fetch y appendMessage que teníamos.
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const fileInput = document.getElementById('file-input');
        const filePreview = document.getElementById('file-preview');

        fileInput.onchange = () => {
            if (fileInput.files.length > 0) filePreview.classList.remove('hidden');
        };

        userInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        async function sendMessage() {
            const message = userInput.value;
            const file = fileInput.files[0];
            if (!message && !file) return;

            const imgUrl = file ? URL.createObjectURL(file) : null;
            appendMessage('user', message || (file ? "Imagen enviada para análisis clínico" : ""), imgUrl);

            userInput.value = '';
            filePreview.classList.add('hidden');
            userInput.style.height = 'auto';

            const formData = new FormData();
            formData.append('message', message || "Analice la imagen adjunta");
            if (file) formData.append('file', file);

            try {
                const response = await fetch('https://localhost:7205/api/Chat/1/send', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                appendMessage('ai', data.aiResponse || "Error en la respuesta.");
                fileInput.value = '';
                fileInput.files = null;
            } catch (error) {
                appendMessage('ai', 'Error de conexión: ' + error.message);
            }
        }

        function appendMessage(sender, text, imageUrl = null) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            let imageHtml = imageUrl ? `<img src="${imageUrl}" class="max-w-xs rounded-lg mb-2 shadow-sm border border-white/20">` : '';
            div.innerHTML = `
                <div class="message-${sender} p-3 max-w-[85%] shadow-sm text-sm leading-relaxed">
                    ${imageHtml}
                    <div>${text.replace(/\n/g, '<br>')}</div>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>

</html>
